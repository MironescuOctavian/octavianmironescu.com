allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
saveExact: true
packageImportMethod: copy
strictSsl: true
preferWorkspacePackages: true
linkWorkspacePackages: true
saveWorkspaceProtocol: false
supportedArchitectures:
  os:
    - win32
    - linux
  cpu:
    - x64
    - arm64
minimumReleaseAge: 4320 # Minutes = 3 Days
minimumReleaseAgeExclude:
  - "pnpm"
  - "astro"
  - "@astrojs/*"
  - "@rimelight/*"
  - vite-plus
  - "@voidzero-dev/*"
  - oxlint
  - "@oxlint/*"
  - oxlint-tsgolint
  - "@oxlint-tsgolint/*"
  - oxfmt
  - "@oxfmt/*"
  - vitest
  - "@vitest/*"
